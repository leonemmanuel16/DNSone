name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dnsone
          POSTGRES_PASSWORD: dnsone
          POSTGRES_DB: dns_one_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dnsone"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info

      - name: Install Python deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check app/

      - name: Unit tests
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+psycopg2://dnsone:dnsone@localhost:5432/dns_one_test
          JWT_SECRET_KEY: ci_secret_for_tests
          BIND_USE_MOCK: "true"
          SCHEDULER_ENABLED: "false"
        run: pytest -v --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
